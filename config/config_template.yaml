# ChainMon server configuration template.
# Copy to config/node_config.yaml on the public server.

node:
  node_id: "server-ali"
  node_name: "Ali Public Chain Server"
  region: "cn-hangzhou"
  mode: "server"

blockchain:
  listen_port: 8080
  block_interval: 30
  consensus_threshold: 80
  ledger_path: "./data/ledger"

# Public servers can still form a consortium chain with each other.
# VPN agents do not need to appear here because they push data outbound.
peers: []

agent:
  # Optional shared token. If set, agents must send X-Agent-Token.
  token: ""

client:
  collect_interval: 30
  ipmi_username: "admin"
  ipmi_password: "admin123"
  ipmi_whitelist:
    - "power"
    - "chassis"
    - "sensor"
    - "fru"
    - "sel"
    - "lan"
    - "user"

devices: []

web:
  port: 5000
  debug: false
  username: "admin"
  password: "admin123"

logging:
  level: "INFO"
  file_path: "./logs/monitor.log"
